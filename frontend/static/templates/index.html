<!doctype html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FastAPI Blog</title>
    <meta name="author" content="Aikins">
    <meta property="og:title" content="FastAPI Blog">
    <meta property="og:type" content="website">
    <meta property="og:image" content="">
    <meta property="og:url" content="">
    <meta property="og:image:alt" content="">
    <meta name="theme-color" content="#527c9f">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/static/css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" id="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">FastApi Blog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">            
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item author-only" style="display:none;"><a class="nav-link" href="author.html">Author Dashboard</a></li>
                    <li class="nav-item admin-only" style="display:none;"><a class="nav-link" href="admin.html">Admin Panel</a></li>
                    <li class="nav-item guest-only"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item guest-only"><a class="nav-link" href="signup.html">Sign Up</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4" id="app-container">
        <div id="alertContainer"></div>

        <section class="blog-toolbar mb-4">
            <div>
                <p class="text-uppercase text-muted fw-semibold small mb-1">Published stories</p>
                <h1 class="mb-1">FastAPI Blog</h1>
                <p class="text-muted mb-0">Read the latest posts from approved authors.</p>
            </div>
            <form id="searchForm" class="blog-search" role="search">
                <label for="searchInput" class="visually-hidden">Search blog posts</label>
                <input id="searchInput" class="form-control" type="search" name="search" placeholder="Search by title">
                <button class="btn btn-primary" type="submit">Search</button>
            </form>
        </section>

        <div id="blogs-page" class="page-content">
            <div id="blogsList" class="blog-list"></div>
            <div id="emptyState" class="content-section p-4 text-center d-none">
                <h2 class="h4">No posts found</h2>
                <p class="text-muted mb-0">Try a different search, or check back after authors publish more posts.</p>
            </div>
            <div id="loadingState" class="content-section p-4 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading posts</span>
                </div>
            </div>
            <div class="text-center mt-4">
                <button id="loadMoreBtn" class="btn btn-outline-primary d-none" type="button">Load more</button>
            </div>
        </div>

        <template id="blogCardTemplate">
            <article class="content-section blog-card p-4">
                <div class="article-metadata d-flex justify-content-between gap-3 mb-3 pb-2">
                    <div>
                        <span class="blog-author fw-semibold"></span>
                        <small class="text-muted d-block">Author</small>
                    </div>
                    <button class="btn btn-sm btn-outline-primary blog-like-btn" type="button">Like</button>
                </div>
                <h2 class="article-title h3 mb-3"></h2>
                <p class="article-content mb-3"></p>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-sm btn-outline-secondary blog-toggle-btn" type="button">Read comments</button>
                </div>
                <div class="blog-detail mt-4 d-none">
                    <div class="comment-composer guest-hidden mb-3">
                        <label class="form-label fw-semibold">Add a comment</label>
                        <textarea class="form-control comment-input" rows="3" placeholder="Share your thoughts"></textarea>
                        <button class="btn btn-primary btn-sm mt-2 comment-submit-btn" type="button">Post comment</button>
                    </div>
                    <p class="guest-message text-muted small mb-3 d-none">Log in as a user to comment or like posts.</p>
                    <div class="comments-list"></div>
                </div>
            </article>
        </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/static/js/theme.js"></script>
    <script type="module" src="/static/js/index.js"></script>
</body>
</html>
